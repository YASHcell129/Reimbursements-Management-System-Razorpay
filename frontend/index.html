<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reimbursements App</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
      form { display: grid; gap: 10px; margin-bottom: 20px; }
      input, button { padding: 10px; }
      #output { white-space: pre-wrap; background: #f5f5f5; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Reimbursements Management System</h1>

    <h2>Register</h2>
    <form id="registerForm">
      <input name="name" placeholder="Name" required />
      <input name="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>

    <h2>Login</h2>
    <form id="loginForm">
      <input name="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <h2>Submit Reimbursement</h2>
    <form id="reimbursementForm">
      <input name="title" placeholder="Title" required />
      <input name="description" placeholder="Description" required />
      <input name="amount" type="number" step="0.01" placeholder="Amount" required />
      <button type="submit">Submit</button>
    </form>

    <h2>Actions</h2>
    <button id="healthBtn">Check Health</button>
    <button id="reimbursementsBtn">List Reimbursements</button>
    <button id="logoutBtn">Logout</button>

    <h2>Output</h2>
    <div id="output">No requests yet.</div>

    <script src="app.js"></script>
  </body>
</html>
